  /* ==================== CERTIFICATE LOOKUP ==================== */
  const cleanSerial = (s) => (s||'').replace(/[\/\s-]/g,'').toUpperCase();
  function doVerify(){
    const name = (document.getElementById('lk-name')?.value||'').toLowerCase().trim();
    const serial = (document.getElementById('lk-serial')?.value||'').toUpperCase().trim();
    const matched = CERTIFICATES.find(c => {
      const mName = name ? c.fullName.toLowerCase().includes(name) : false;
      const mSerial = serial ? cleanSerial(c.serialNumber)===cleanSerial(serial) : false;
      if (name && serial) return mName && mSerial;
      return mName || mSerial;
    });
    state.lookup = { searched:true, found: matched || null };
    render();
  }
  function resetLookup(){ state.lookup = { searched:false, found:null }; render(); }

          <div class="bg-white border border-slate-200 rounded-2xl p-8 sm:p-10 shadow-sm relative overflow-hidden hover:shadow-md transition-all"><div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500 rounded-full blur-3xl opacity-[0.03]"></div><div class="p-3 bg-cyan-50 text-cyan-600 rounded-xl w-fit mb-6 border border-cyan-100">${icon('compass','w-6 h-6')}</div><h3 class="text-lg font-black text-slate-900 mb-4">${esc(a.visionTitle)}</h3><p class="text-xs text-slate-600 leading-relaxed">${esc(a.visionText)}</p></div>

  /* ==================== CONTACT ==================== */
  function submitContact(){
    const box = document.getElementById('contact-body');
    if (!box) return;
    const t = T[state.lang];
    box.innerHTML = `<div class="py-16 text-center flex flex-col items-center gap-4"><div class="w-14 h-14 rounded-full bg-teal-50 text-[#00a29a] flex items-center justify-center">${icon('check','w-7 h-7')}</div><h4 class="text-sm font-bold text-slate-900">${esc(t.contact.formSubmit)}</h4><p class="text-xs text-slate-500 leading-relaxed max-w-sm">${esc(t.contact.successMsg)}</p></div>`;
    lucide.createIcons();
  }

  function renderContact(){
    const t = T[state.lang], c = t.contact;
    return `<div class="font-sans text-slate-800 bg-gradient-to-tr from-[#f4faf8] via-white to-[#fbfdfc] min-h-screen py-16 relative overflow-hidden">
      ${waves('page')}

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
          <div class="lg:col-span-5 space-y-6">

              <div class="absolute right-0 bottom-0 w-64 h-64 bg-[#00a29a] rounded-full blur-3xl opacity-10"></div>
              <h3 class="text-sm font-black font-mono tracking-wider uppercase text-[#00a29a] border-b border-slate-800 pb-3 mb-6">${esc(c.directory)}</h3>
              <div class="space-y-6">
                <div class="flex gap-4 items-start ltr:text-left rtl:text-right"><span class="p-2.5 bg-slate-800 rounded-lg text-[#00a29a] border border-slate-700">${icon('phone','w-5 h-5')}</span><div><h4 class="text-[10px] font-bold font-mono text-slate-400 uppercase tracking-wider">${esc(c.phone)}</h4><span class="text-sm font-bold block mt-1" dir="ltr">${PHONE}</span><span class="text-[11px] text-slate-400">${esc(c.phoneNote)}</span></div></div>
                <div class="flex gap-4 items-start ltr:text-left rtl:text-right"><span class="p-2.5 bg-slate-800 rounded-lg text-[#00a29a] border border-slate-700">${icon('mail','w-5 h-5')}</span><div><h4 class="text-[10px] font-bold font-mono text-slate-400 uppercase tracking-wider">${esc(c.email)}</h4><a href="mailto:${EMAIL}" class="text-sm font-bold block mt-1 hover:text-[#00a29a] transition-colors">${EMAIL}</a><span class="text-[11px] text-slate-400">${esc(c.emailNote)}</span></div></div>
                <div class="flex gap-4 items-start ltr:text-left rtl:text-right"><span class="p-2.5 bg-slate-800 rounded-lg text-[#00a29a] border border-slate-700">${icon('map-pin','w-5 h-5')}</span><div><h4 class="text-[10px] font-bold font-mono text-slate-400 uppercase tracking-wider">${esc(c.location)}</h4><span class="text-xs font-bold block mt-1">Avenue Feu Président Yasser Arafat, ZRB 32<br/>BP 2852 – Nouakchott, Mauritania</span></div></div>
                <div class="flex gap-4 items-start ltr:text-left rtl:text-right"><span class="p-2.5 bg-slate-800 rounded-lg text-[#00a29a] border border-slate-700">${icon('clock','w-5 h-5')}</span><div><h4 class="text-[10px] font-bold font-mono text-slate-400 uppercase tracking-wider">${esc(c.hours)}</h4><span class="text-xs font-bold block mt-1.5">${esc(c.hoursWeek)}</span><span class="text-xs font-bold block mt-0.5">${esc(c.hoursFri)}</span></div></div>
              </div>
              <a href="${WA}" target="_blank" rel="noopener noreferrer" class="mt-6 w-full flex items-center justify-center gap-2 px-4 py-3 bg-[#00a29a] hover:bg-[#008f88] text-white text-sm font-bold rounded-md transition-all">${icon('message-circle','w-4 h-4')}<span>${esc(c.whatsappBtn)}</span></a>
            </div>
          </div>
          <div class="lg:col-span-7">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-md overflow-hidden">
              <div class="bg-[#111827] text-white p-6"><h3 class="text-base font-bold tracking-tight">${esc(c.formTitle)}</h3></div>
              <div id="contact-body" class="p-6 sm:p-8">
                <form id="contact-form" class="space-y-4">
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formName)} *</label><input required type="text" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none"/></div>
                    <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formCompany)} *</label><input required type="text" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none"/></div>
                  </div>
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formEmail)} *</label><input required type="email" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none"/></div>
                    <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formPhone)} *</label><input required type="tel" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none"/></div>
                  </div>
                  <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formService)}</label><select class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none bg-white">${c.services.map(s=>`<option>${esc(s)}</option>`).join('')}</select></div>
                  <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formUrgency)}</label><select class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none bg-white">${c.urgencyOpts.map(s=>`<option>${esc(s)}</option>`).join('')}</select></div>
                  <div><label class="block text-xs font-bold text-slate-700 mb-1">${esc(c.formDetails)}</label><textarea rows="3" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-md focus:ring-1 focus:ring-[#00a29a] focus:border-[#00a29a] outline-none resize-none"></textarea></div>
                  <div class="flex justify-end pt-2"><button type="submit" class="px-5 py-2.5 bg-[#00a29a] hover:bg-[#008f88] text-white text-xs font-bold rounded-md transition-all shadow-md shadow-[#00a29a]/15 flex items-center gap-1.5">${icon('send','w-4 h-4')}<span>${esc(c.formSubmit)}</span></button></div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  /* ==================== FOOTER ==================== */
  function renderFooter(){
    const t = T[state.lang], f = t.footer;
    return `<footer class="bg-[#0f172a] text-slate-400 border-t border-slate-800 font-sans">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 lg:py-16">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 lg:gap-12">
          <div class="flex flex-col gap-4">
            <div class="cursor-pointer" data-tab="home">${logo('sm',true)}</div>
            <p class="text-xs text-slate-400 leading-relaxed max-w-sm mt-2">${esc(f.blurb)}</p>
            <div class="flex items-center gap-2 text-[#00a29a] font-medium text-xs mt-2">${icon('shield-check','w-4 h-4 shrink-0')}<span>${esc(f.reg)}</span></div>
          </div>
          <div>
            <h3 class="text-white font-bold text-sm tracking-wider uppercase mb-4 ltr:border-l-2 rtl:border-r-2 border-[#00a29a] ltr:pl-2 rtl:pr-2">${esc(f.quick)}</h3>
            <ul class="space-y-2.5 text-xs">${NAV.map(id=>`<li><button data-tab="${id}" class="hover:text-[#00a29a] transition-all ltr:text-left rtl:text-right">${esc(t.nav[id])}</button></li>`).join('')}</ul>
          </div>
          <div>
            <h3 class="text-white font-bold text-sm tracking-wider uppercase mb-4 ltr:border-l-2 rtl:border-r-2 border-[#00a29a] ltr:pl-2 rtl:pr-2">${esc(f.hq)}</h3>
            <ul class="space-y-3 text-xs leading-relaxed">
              <li class="flex gap-2.5">${icon('map-pin','w-4 h-4 shrink-0 text-[#00a29a]')}<span>Avenue Feu Président Yasser Arafat, ZRB 32<br/>BP 2852 – Nouakchott, Mauritania</span></li>
              <li class="flex items-center gap-2.5">${icon('phone','w-4 h-4 shrink-0 text-[#00a29a]')}<span dir="ltr">${PHONE}</span></li>
              <li class="flex items-center gap-2.5">${icon('mail','w-4 h-4 shrink-0 text-[#00a29a]')}<a href="mailto:${EMAIL}" class="hover:text-[#00a29a] transition-all">${EMAIL}</a></li>
            </ul>
          </div>
          <div>
            <h3 class="text-white font-bold text-sm tracking-wider uppercase mb-4 ltr:border-l-2 rtl:border-r-2 border-[#00a29a] ltr:pl-2 rtl:pr-2">${esc(f.verifyCol)}</h3>
            <p class="text-xs text-slate-400 mb-4 leading-relaxed">${esc(f.verifyBlurb)}</p>
            <button data-tab="lookup" class="inline-flex items-center gap-1.5 px-3 py-2 bg-slate-800 hover:bg-[#00a29a] hover:text-white rounded-md text-xs font-semibold text-[#00a29a] transition-all">${esc(t.nav.lookup)}${icon('external-link','w-3.5 h-3.5')}</button>
          </div>
        </div>
      </div>
      <div class="bg-[#0b0f19] py-6 border-t border-slate-900 text-slate-500 text-[11px] font-medium font-mono">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-center">
          <div>${esc(f.rights)}</div>
          <div class="flex gap-4"><a href="mailto:${EMAIL}" class="hover:text-slate-300">${EMAIL}</a><span>|</span><a href="http://${WEB}" target="_blank" rel="noopener noreferrer" class="hover:text-slate-300 flex items-center gap-0.5"><span>${WEB}</span>${icon('external-link','w-3 h-3')}</a></div>
        </div>
      </div>
    </footer>`;
  }

  /* ==================== VIEW ROUTER + RENDER ==================== */
  function renderView(){
    switch(state.tab){
      case 'services': return renderServices();
      case 'lookup': return renderLookup();
      case 'about': return renderAbout();
      case 'contact': return renderContact();
      default: return renderHome();
    }
  }

  function render(){
    document.documentElement.lang = state.lang;
    document.documentElement.dir = state.lang==='ar' ? 'rtl' : 'ltr';
    document.getElementById('root').innerHTML =
      `${renderNav()}<main class="flex-grow"><div class="view-anim" key="${state.tab}-${state.lang}">${renderView()}</div></main>${renderFooter()}`;
    lucide.createIcons();
  }

  /* ==================== EVENTS (delegation) ==================== */
  document.addEventListener('click', (e) => {
    const tabBtn = e.target.closest('[data-tab]');
    if (tabBtn){ state.tab = tabBtn.getAttribute('data-tab'); state.menu=false; state.langOpen=false; if(state.tab!=='lookup') state.lookup={searched:false,found:null}; render(); window.scrollTo({top:0,behavior:'smooth'}); return; }
    const langBtn = e.target.closest('[data-lang]');
    if (langBtn){ state.lang = langBtn.getAttribute('data-lang'); state.langOpen=false; render(); return; }
    if (e.target.closest('[data-toggle-lang]')){ state.langOpen=!state.langOpen; render(); return; }
    if (e.target.closest('[data-close-lang]')){ state.langOpen=false; render(); return; }
    if (e.target.closest('[data-toggle-menu]')){ state.menu=!state.menu; render(); return; }
    if (e.target.closest('[data-reset-lookup]')){ resetLookup(); return; }
  });

  document.addEventListener('submit', (e) => {
    if (e.target.id==='lookup-form'){ e.preventDefault(); doVerify(); return; }
    if (e.target.id==='contact-form'){ e.preventDefault(); submitContact(); return; }
  });

  window.addEventListener('load', () => setTimeout(()=>lucide.createIcons(), 50));
  render();
  </script>
</body>
</html>
